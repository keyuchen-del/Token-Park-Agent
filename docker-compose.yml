# 本地一键启动 token-park-agent
# 用法：
#   1. 复制 .env.example 为 .env，填 API keys
#   2. docker compose up --build
#   3. 后端: http://localhost:8000/docs
#      前端: http://localhost:3000

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tpagent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CONFIG_DIR: /app/config
      DATA_DIR: /app/data
      SESSIONS_DIR: /app/sessions
      DB_PATH: /app/data/tpagent.db
    volumes:
      - tpagent-data:/app/data
      - tpagent-sessions:/app/sessions
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tpagent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 前端调 backend：容器互联用 service name
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tpagent-data:
  tpagent-sessions:
