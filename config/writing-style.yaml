# Token 公园写作风格规则（迁移自 templates/writing-style.md）
# 改这里 = 改写作风格，不需要改代码

# === 一、连词替换 ===
connectors:
  forbidden:
    - "第一，"
    - "第二，"
    - "第三，"
    - "第一、"
    - "第二、"
    - "第三、"
  recommended:
    - "首先 / 然后 / 还有"
    - "一来 / 二来"
    - "先说 X / 再说 Y"
    - "一个是 X / 另一个是 Y"
  # 例外：序数表述允许保留（如"第三大头""第二季度"）
  exceptions:
    - "第三大头"
    - "第二季度"
    - "第三方"

# === 二、半括号「」清理 ===
brackets:
  forbidden: ["「", "」"]
  replacement_rules:
    term: "**加粗**"          # 术语、概念名词、单字强调
    thought: '"双引号"'        # 想法、口号、对话、整句引用
    paper_title: "《书名号》"  # 论文、书名、文章名
    delete: "直接删除"         # 强调不重要时

# === 三、结尾风格 ===
ending:
  forbidden_signatures:
    - "大时代啊"
    - "三连吧"
    - "我们，下次再见"
    - "以上既然看到这里了"
    - "OK 文章到这里就结束了"
  required_elements:
    - "具体画面（截图、动作、物件、场景）"
    - "呼应正文伏笔"
    - "未完成式留余味（我先给它留着 / 等秋天 / 两年后再看）"
  cta_principles:
    - "克制 + 跟主题挂钩"
    - "禁止：点赞在看转发三连吧（模板化）"
    - "推荐：转给一个还在堆 GPU 的朋友 / 转给一个被算力账单逼疯的朋友"

# === 四、AI 高频词扫描 ===
ai_smell_words:
  paragraph_starters:
    - "其实"
    - "那么"
    - "事实上"
    - "说白了"
  transitions:
    - "让我们一起来看看"
    - "下面我将"
    - "接下来"
    - "首先...其次...最后"
  pretentious:
    - "值得我们深思"
    - "令人深思"
    - "不容忽视"
    - "举足轻重"
  templated_pairs:
    - "不仅.*而且"
    - "既.*又"
  punctuation_substitutes:
    - "段尾大量感叹号"
    - "段尾大量省略号假装情绪"

# === 五、卡兹克可保留部分 ===
khazix_keepers:
  - "第一段就给冲突（刷到一条消息 / 一句话把我看懵了）"
  - "大白话解释技术（100 × 100 = 10000 次比较 代替 二次方复杂度）"
  - "数字震惊体（单行放一个数字 + 三个句号）"
  - "历史类比给纵深"
  - "段落极短（一句一段）"

# === 六、内容独立性硬规则 ===
cross_date_forbidden:
  patterns:
    - "昨天[我们|聊过|说到]"
    - "上次那篇"
    - "之前提到的"
    - "前几天聊过"
    - "上一篇"
  ops_forbidden:
    - "跨篇追踪"
    - "内链建议"
    - "主题系列"
  exception: "用户明确要求系列时除外，且文章标题或开头明示系列名"

# === 七、字数与格式 ===
length:
  min_chars: 3500
  max_chars: 5000
  ideal: 4000
format:
  no_subheadings: true
  short_paragraphs_min: 3
  paragraph_max_lines: 5
